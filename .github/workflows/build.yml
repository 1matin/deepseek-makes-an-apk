name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-venv git zip unzip openjdk-17-jdk
        pip install --upgrade Cython==0.29.33 virtualenv

    - name: Install Buildozer
      run: pip install buildozer

    - name: Create buildozer.spec
      run: |
        printf '%s\n' \
          '[app]' \
          'title = SMS Chat' \
          'package.name = smschat' \
          'package.domain = org.example' \
          'source.dir = .' \
          'source.include_exts = py,jpg,png,ttf' \
          'version = 1.0' \
          'requirements = python3,kivy,plyer,pyjnius,android' \
          'orientation = portrait' \
          'fullscreen = 1' \
          'android.permissions = INTERNET,SEND_SMS,RECEIVE_SMS,READ_SMS,WRITE_SMS,RECEIVE_BOOT_COMPLETED' \
          'android.api = 31' \
          'android.minapi = 21' \
          'android.ndk = 23b' \
          'android.services = SmsListenerService:app/main.py' \
          'p4a.branch = develop' \
          > buildozer.spec

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sms-chat-apk
        path: bin/*.apk
